name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # "skipped" is an all-jobs-skipped CI run, which only happens for
    # squash-merge pushes already verified (and forced green) on the PR; a red
    # direct push concludes "failure" and blocks here. The event guard keeps
    # fork-PR CI runs (whose head branch may be named "master") from deploying
    # unmerged code.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.conclusion == 'success' ||
        github.event.workflow_run.conclusion == 'skipped'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the SHA CI verified; manual dispatches always
          # deploy master regardless of the branch picked in the UI.
          ref: ${{ github.event.workflow_run.head_sha || 'master' }}

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
