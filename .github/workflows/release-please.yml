name: Release Please

# Opt-in releases: first merge the commits you want to ship from master into the
# release branch, then run this workflow manually. release-please opens or
# refreshes a release PR against `release` that bumps the version and updates
# CHANGELOG.md from Conventional Commit messages since the last release.
#
# Merging that release PR back into `release` triggers this workflow on push,
# tags vX.Y.Z, and publishes a GitHub Release. The version bump in package.json
# flows into the UI stamp automatically (vite injects pkg.version as
# __APP_VERSION__).
#
# Cloudflare Workers Builds watches `release` and deploys it to dspi-ctrl.fyi.
# GitHub Pages (deploy.yml, every master push) stays the rolling test channel.
#
# Requires repo setting: Settings -> Actions -> General -> Workflow permissions
# -> enable "Allow GitHub Actions to create and approve pull requests".

on:
  workflow_dispatch:
  push:
    branches: [release]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: release
