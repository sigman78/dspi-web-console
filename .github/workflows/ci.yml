name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Squash-merged PRs (committed by GitHub, title carries "(#NN)") were
    # already verified by the pull_request run; the push trigger only covers
    # direct pushes. The committer check keeps locally-pushed commits that
    # merely mention "(#123)" (e.g. reverts of squash merges) verified.
    if: >-
      github.event_name != 'push' ||
      !(contains(github.event.head_commit.message, '(#') &&
        github.event.head_commit.committer.email == 'noreply@github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Typecheck (svelte-check + tsc)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test (unit + integration, no hardware)
        run: npm test
