<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b1220" />

    <!-- Critical inline paint: dark background from the very first frame, before
         the bundled stylesheet/JS load. Without it the SPA shows a white flash
         until app.css applies. Matches app.css --bg (oklch 10% 0.01 250). -->
    <style>
      html { background-color: oklch(10% 0.01 250); color-scheme: dark; }
      body { margin: 0; }
    </style>

    <title>DSPi Console Web</title>
    <meta
      name="description"
      content="Browser-based configurator for the DSPi USB DSP board — EQ, mixer, master, processing, and telemetry over WebUSB. No installer, no drivers."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DSPi Console Web" />
    <meta property="og:title" content="DSPi Console Web" />
    <meta
      property="og:description"
      content="Browser-based configurator for the DSPi USB DSP board — EQ, mixer, master, processing, and telemetry over WebUSB. No installer, no drivers."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="DSPi Web Console — stylized waveform logo on a dark gradient background" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DSPi Console Web" />
    <meta
      name="twitter:description"
      content="Browser-based configurator for the DSPi USB DSP board — EQ, mixer, master, processing, and telemetry over WebUSB."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="DSPi Web Console — stylized waveform logo on a dark gradient background" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
